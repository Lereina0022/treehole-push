name: Treehole Push

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  run-task:
    runs-on: ubuntu-latest

    env:
      TREEHOLE_COOKIE: ${{ secrets.TREEHOLE_COOKIE }}
      TREEHOLE_TOKEN: ${{ secrets.TREEHOLE_TOKEN }}
      SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      DB_PATH: data/treehole.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run script
        run: python main.py
