name: Treehole Push

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  run-treehole-push:
    runs-on: ubuntu-latest

    env:
      TREEHOLE_BASE_URL: https://treehole.pku.edu.cn
      TREEHOLE_SEARCH_API: /chapi/api/v3/hole/list_comments
      TREEHOLE_TIMEOUT: 15

      MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
      MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      MYSQL_DB: ${{ secrets.MYSQL_DB }}
      MYSQL_SSL_CA: /home/runner/work/_temp/aiven-ca.pem

      TREEHOLE_AUTHORIZATION: ${{ secrets.TREEHOLE_AUTHORIZATION }}
      TREEHOLE_COOKIE: ${{ secrets.TREEHOLE_COOKIE }}
      TREEHOLE_X_XSRF_TOKEN: ${{ secrets.TREEHOLE_X_XSRF_TOKEN }}
      TREEHOLE_UUID: ${{ secrets.TREEHOLE_UUID }}

      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}

      RECENT_DAYS: 7
      SEARCH_PAGE: 1
      SEARCH_LIMIT: 20
      SEARCH_COMMENT_LIMIT: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write Aiven CA certificate
        run: |
          cat > "$MYSQL_SSL_CA" <<'EOF'
          ${{ secrets.MYSQL_SSL_CA_PEM }}
          EOF

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run treehole push
        run: |
          python -m app.runner_core
